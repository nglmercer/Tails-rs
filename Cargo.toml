[package]
name = "tails-rs"
version = "0.1.0"
edition = "2024"
description = "A TypeScript-first runtime in Rust"
license = "MIT"

[lib]
name = "tails"
path = "src/lib.rs"

[[bin]]
name = "tails"
path = "src/main.rs"

[dependencies]
# Parsing
swc = "0.280"
swc_ecma_ast = "0.118"
swc_ecma_parser = "0.144"
swc_ecma_transforms = "0.224"
swc_ecma_visit = "0.96"

# Async Runtime
tokio = { version = "1", features = ["full"] }

# Memory & Performance
bumpalo = "3.14"
rustc-hash = "1.1"
mimalloc = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Utilities
thiserror = "1.0"
anyhow = "1.0"
log = "0.4"
env_logger = "0.10"

# FFI Support
libc = "0.2"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "runtime"
harness = false
