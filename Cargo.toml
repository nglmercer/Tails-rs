[package]
name = "tails-rs"
version = "0.1.0"
edition = "2021"
description = "A TypeScript-first runtime in Rust"
license = "MIT"

[lib]
name = "tails"
path = "src/lib.rs"

[[bin]]
name = "tails"
path = "src/main.rs"

[dependencies]
# Async Runtime
tokio = { version = "1", features = ["full"] }

# Memory & Performance
bumpalo = "3.14"
rustc-hash = "1.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Utilities
thiserror = "1.0"
anyhow = "1.0"
log = "0.4"
env_logger = "0.10"

# File watching
notify = "8"

# FFI Support
libc = "0.2"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "runtime"
harness = false
